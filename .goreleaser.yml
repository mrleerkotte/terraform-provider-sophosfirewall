version: 2

project_name: terraform-provider-sophosfirewall

before:
  hooks:
    - go mod tidy

builds:
  - id: provider
    main: .
    binary: terraform-provider-sophosfirewall
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: provider
    ids:
      - provider
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  disable: true
